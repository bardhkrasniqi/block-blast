name: BlockBlast
options:
  bundleIdPrefix: com.bardhkrasniqi
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  BlockBlast:
    type: application
    platform: iOS
    sources:
      - path: BlockBlast
      # www is a folder reference: the whole directory is copied into the
      # app bundle so WKWebView can load www/index.html offline.
      - path: BlockBlast/www
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bardhkrasniqi.blockblast
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_CFBundleDisplayName: Block Blast
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
